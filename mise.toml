[env]
ZEPHYR_SDK_TOOLCHAINS = "x86_64-zephyr-elf"
ZEPHYR_TOOLCHAIN_VARIANT = "zephyr"
_.source = { path = ".mise/env/env.sh", tools = true }

[tools]
cmake = "3"
ninja = "latest"
uv = "0.11.6"
clang-format = "22.1.4"
"pipx:west" = { version = "1.5.0", uvx_args = "--with jsonschema --with pyelftools --with intelhex --with natsort --with junitparser --with tabulate --with pytest --with ply --with psutil --with python-dotenv --with pyserial --with anytree --with pyyaml --with pylink-square --with toml --with packaging --with click --with cbor2 --with cryptography"}
"pipx:gcovr" = "8.6"
"conda:cxx-compiler" = "latest"

# The Zephyr SDK.
# (https://mise.en.dev/dev-tools/backends/github.html#platform-specific-asset-patterns).
[tools."github:zephyrproject-rtos/sdk-ng"]
version = "0.17.4"
postinstall = "bash {{config_root}}/.mise/postinstalls/zephyr-sdk.sh"
[tools."github:zephyrproject-rtos/sdk-ng".platforms]
linux-x64    = { asset_pattern = "zephyr-sdk-*_linux-x86_64_minimal.tar.xz" }
linux-arm64  = { asset_pattern = "zephyr-sdk-*_linux-aarch64_minimal.tar.xz" }
macos-x64    = { asset_pattern = "zephyr-sdk-*_macos-x86_64_minimal.tar.xz" }
macos-arm64  = { asset_pattern = "zephyr-sdk-*_macos-aarch64_minimal.tar.xz" }

[tasks.configure-debug]
description = "Configure a Debug build with tests (preset: debug)"
run = "cmake --preset debug"

[tasks.build-debug]
description = "Build the Debug configuration"
depends = ["configure-debug"]
run = "cmake --build --preset debug"

[tasks.test-debug]
description = "Run unit tests for the Debug configuration"
depends = ["build-debug"]
run = "ctest --preset debug"

[tasks.configure-release]
description = "Configure a Release build with tests (preset: release)"
run = "cmake --preset release"

[tasks.build-release]
description = "Build the Release configuration"
depends = ["configure-release"]
run = "cmake --build --preset release"

[tasks.test-release]
description = "Run unit tests for the Release configuration"
depends = ["build-release"]
run = "ctest --preset release"

# ── Posix Examples ────────────────────────────────────────────────────────

[tasks.example-build]
description = "Build the led_actor example (debug + examples preset)"
run = "cmake --preset debug-examples && cmake --build --preset debug-examples"

[tasks.example-build-release]
description = "Build the led_actor example (release + examples preset)"
run = "cmake --preset release-examples && cmake --build --preset release-examples"

[tasks.run-example]
description = "Run the led_actor example"
depends = ["example-build"]
run = '''
#!/bin/bash
set -euo pipefail

LOG="$(mktemp)"
stdbuf -oL -eL ./build/debug-examples/led_actor_example 2>&1 | tee "$LOG"
grep -q '^done$' "$LOG"
'''

[tasks.configure]
description = "Configure Debug build with tests (alias for configure-debug)"
run = "cmake --preset debug"

[tasks.build]
description = "Build the Debug configuration (alias for build-debug)"
depends = ["configure"]
run = "cmake --build --preset debug"

[tasks.test-unit]
description = "Run unit tests for the Debug configuration (alias for test-debug)"
depends = ["build"]
run = "ctest --preset debug"

[tasks.coverage]
description = "Configure, build, run tests, and produce SonarQube coverage.xml"
run = '''
#!/bin/bash
set -euo pipefail
cmake --preset coverage
cmake --build --preset coverage
ctest --preset coverage --output-on-failure
# gcovr 8.x: --filter / --exclude take directory paths, not regexes.
# Path separators must be forward slashes. Files under the build dir are
# auto-discovered relative to the source tree.
# Sonar reads coverage.xml referenced by sonar.coverageReportPaths.
gcovr \
  --root "${PWD}" \
  --filter "src/" \
  --exclude "tests/" \
  --exclude "build/" \
  --print-summary \
  --sonarqube "build/coverage/coverage.xml"
'''

# ---- Zephyr Integration ----

[tasks.west-init]
description = "Initialize Zephyr's west workspace"
dir = "{{ config_root }}/examples/basic_zephyr"
run = '''
#!/bin/bash
set -euo pipefail

if [[ ! -d ../.west ]]; then
  west init -l 
fi

west update
'''

[tasks.build-zephyr-example]
description = "Build the Zephyr example"
dir = "{{ config_root }}/examples/basic_zephyr"
run = "west build -b native_sim/native/64 . -d build -p always"

[tasks.run-zephyr-example]
description = "Run the Zephyr example"
depends = ["build-zephyr-example"]
dir = "{{ config_root }}/examples/basic_zephyr"
run = '''
#!/bin/bash
set -euo pipefail

LOG="$(mktemp)"
west build -t run -d build 2>&1 | tee "$LOG"
grep -q '^zephyr-basic OK$' "$LOG"
'''

# ── Formatting ────────────────────────────────────────────────────────────

[tasks.format]
description = "Format C/C++ sources in place with clang-format"
run = '''
git ls-files -z -- 'src/*.c' 'src/*.h' 'include/*.h' 'src/port/**/*.[ch]' 'tests/**/*.cpp' 'tests/**/*.c' 'tests/**/*.h' 'examples/**/*.c' 'examples/**/*.h' |
  xargs -0 mise exec -- clang-format --style=file -i
'''

[tasks.check-format]
description = "Check that tracked C/C++ sources are clang-formatted (non-destructive)"
run = '''
git ls-files -z -- 'src/*.c' 'src/*.h' 'include/*.h' 'src/port/**/*.[ch]' 'tests/**/*.cpp' 'tests/**/*.c' 'tests/**/*.h' 'examples/**/*.c' 'examples/**/*.h' |
  xargs -0 mise exec -- clang-format --style=file --dry-run --Werror
'''

# ── Misc ───────────────────────────────────────────────────────────────────

[tasks.clean]
description = "Remove all build directories"
run = "rm -rf build build-*"
