name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref on new pushes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check (format, unit tests)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Install mise
        uses: jdx/mise-action@v4
        with:
          # Trust the repo's mise.toml and install everything in [tools].
          mise_trust: "true"
          install: "true"

      - name: Cache build directory
        uses: actions/cache@v4
        with:
          path: build
          # Bump the key whenever the build graph or its dependencies move.
          key: build-debug-${{ runner.os }}-${{ hashFiles('CMakePresets.json', 'tests/CMakeLists.txt', 'cmake/GTest.cmake') }}
          restore-keys: |
            build-debug-${{ runner.os }}-

      - name: Check formatting
        run: mise run check-format

      - name: Configure (debug + tests)
        run: mise run configure

      - name: Run unit tests with coverage
        run: mise run coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  posix-integration:
    name: posix integration (led_actor example)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v4
        with:
          mise_trust: "true"
          install: "true"

      - name: Cache build directory
        uses: actions/cache@v4
        with:
          path: |
            build
            build-*
          key: build-examples-${{ runner.os }}-${{ hashFiles('CMakePresets.json', 'examples/led_actor/*.c') }}
          restore-keys: |
            build-examples-${{ runner.os }}-

      - name: Build example
        run: mise run example-build

      - name: Run example
        # The mise task streams output live and verifies the example's
        # "done" shutdown marker.
        run: mise run run-example

  zephyr-integration:
    name: zephyr integration (native_sim sample)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install mise + project toolchain
        uses: jdx/mise-action@v4
        with:
          mise_trust: "true"
          install: "true"

      - name: Cache west workspace
        uses: actions/cache@v4
        with:
          path: |
            examples/.west
            examples/zephyr
          key: zephyr-basic-${{ runner.os }}-${{ hashFiles('examples/basic_zephyr/west.yml', 'examples/basic_zephyr/**', 'zephyr/**', 'src/port/zephyr/**', 'src/ipc.c', 'include/**') }}
          restore-keys: |
            zephyr-basic-${{ runner.os }}-

      - name: Init west workspace
        run: mise run west-init

      - name: Run Zephyr example
        run: mise run run-zephyr-example
