sonar.projectKey=klab365_actor_framework_cxx
sonar.organization=klab365

sonar.sources=src,include,tests,examples
sonar.cfamily.compile-commands=build/coverage/compile_commands.json

# Coverage (gcovr --sonarqube coverage.xml is uploaded by the CI coverage job)
sonar.coverageReportPaths=build/coverage/coverage.xml

# Mocks are test-only stubs that ship with the test suite; they aren't
# part of the framework's source surface and should not show up in
# Sonar's coverage report.
sonar.exclusions=tests/**,build/**,build-*/**,.devcontainer/**,.github/**

# Exclude the entire tests/ tree from coverage reporting. Tests are
# analyzed as part of sonar.sources, but their coverage shouldn't be
# reported — coverage should reflect the framework code under src/,
# include/, and examples/.
sonar.coverage.exclusions=tests/**,src/port/**/*.c

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8